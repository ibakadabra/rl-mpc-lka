algorithm: "SAC"

sac:
  learning_rate: 3.0e-4
  batch_size: 256
  buffer_size: 1000000
  gamma: 0.99
  tau: 0.005
  hidden_layers: [256, 256]
  activation: "ReLU"
  auto_entropy_tuning: true
  total_timesteps: 200000        # internal sim
  total_timesteps_carla: 500000  # CARLA

# RL ↔ MPC interface
interface:
  rl_frequency_hz: 2.0           # RL runs at 2 Hz
  mpc_steps_per_rl: 10           # 10 MPC steps per RL step

# Action → weight mapping (log scale)
weight_mapping:
  q1_range: [1.0, 1000.0]       # ey weight
  q2_range: [1.0, 1000.0]       # eψ weight
  r1_range: [0.1, 10.0]         # δ weight

# Reward
reward:
  w_ey: 1.0
  w_epsi: 0.5
  w_delta_rate: 0.1
  w_ay: 0.05
  alive_bonus: 1.0

# Termination
termination:
  ey_max: 2.5                   # lane departure (m)
  max_episode_steps: 2000

# Training
training:
  eval_frequency: 50             # evaluate every N episodes
  eval_scenarios: 5
  n_seeds: 5                     # for statistical comparison
  normalize_obs: true            # VecNormalize
  curriculum:
    enabled: true
    stages:
      - name: "straight"
        kappa_max: 0.01
        episodes: 200
      - name: "gentle_curves"
        kappa_max: 0.05
        episodes: 300
      - name: "all_roads"
        kappa_max: 0.15
        episodes: 500
